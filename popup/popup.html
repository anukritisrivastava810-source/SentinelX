<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SentinelX</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════
       HEADER — Minimalist branding + compact status
  ════════════════════════════════════════════ -->
  <header class="header">
    <div class="brand">
      <div class="brand-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 22C17.5 20.5 21 15.5 21 10.5V5.5L12 2L3 5.5V10.5C3 15.5 6.5 20.5 12 22Z" fill="currentColor" stroke="none"/>
          <path d="M9 12L11 14L15 10" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="brand-name">Sentinel<span class="brand-x">X</span></span>
    </div>

    <!-- Live status pill -->
    <div class="status-pill" id="statusPill">
      <span class="pulse-dot"></span>
      <span class="status-text" id="statusText">Scanning...</span>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════
       MAIN CONTENT
  ════════════════════════════════════════════ -->
  <main class="main">

    <!-- ── CURRENT SITE CARD ── -->
    <section class="card url-card">
      <div class="card-label">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        Current Site
      </div>
      <div class="url-display" id="urlDisplay">Loading...</div>

      <!-- HTTPS + Domain Badges -->
      <div class="meta-row">
        <div class="badge" id="httpsBadge">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <span id="httpsLabel">Checking...</span>
        </div>
        <div class="badge badge-neutral" id="domainBadge">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          <span id="domainLabel">—</span>
        </div>
      </div>
    </section>

    <!-- ── SECURITY RISK CARD ── -->
    <section class="card risk-card" id="riskCard">
      <div class="card-label">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        Security Analysis
      </div>

      <div class="score-display">
        <div class="score-number-wrapper">
          <span class="score-number" id="riskScore">—</span>
          <span class="score-label">Risk Score</span>
        </div>
        
        <div class="score-meta">
          <div class="safety-label" id="safetyLabel">
            <span class="label-dot" id="labelDot"></span>
            <span id="labelText">Analyzing</span>
          </div>
          <div class="score-detail" id="scoreDetail">Running checks...</div>
        </div>
      </div>

      <!-- Risk level bar: left = safe (low), right = dangerous (high) -->
      <div class="trust-bar-container">
        <div class="trust-bar-track">
          <div class="trust-bar-fill" id="riskBarFill"></div>
        </div>
        <div class="trust-bar-labels">
          <span>Safe</span>
          <span>Moderate</span>
          <span>Dangerous</span>
        </div>
      </div>
    </section>

    <!-- ── SECURITY CHECKS CARD ── -->
    <section class="card checks-card">
      <div class="card-label">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 11 12 14 22 4"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
        Security Checks
      </div>

      <ul class="checks-list" id="checksList">
        <li class="check-item check-pending">
          <span class="check-icon">
            <svg class="check-svg spinner" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="2" x2="12" y2="6"></line>
              <line x1="12" y1="18" x2="12" y2="22"></line>
              <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line>
              <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line>
              <line x1="2" y1="12" x2="6" y2="12"></line>
              <line x1="18" y1="12" x2="22" y2="12"></line>
              <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line>
              <line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line>
            </svg>
          </span>
          <span class="check-text">Running analysis...</span>
        </li>
      </ul>
    </section>
    
    <!-- ── RECENT SCANS HISTORY CARD ── -->
    <section class="card history-card">
      <div class="card-label">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        Recent Scans
      </div>
      <div class="history-empty" id="historyEmpty">No recent scans logged.</div>
      <ul class="history-list" id="historyList"></ul>
    </section>

  </main>

  <!-- ═══════════════════════════════════════════
       FOOTER
  ════════════════════════════════════════════ -->
  <footer class="footer">
    <span class="footer-time" id="scanTime">—</span>
    <span class="footer-brand">SentinelX v1.0</span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
