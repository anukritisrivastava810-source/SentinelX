<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SentinelX</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════
       HEADER — Branding + Status Indicator
  ════════════════════════════════════════════ -->
  <header class="header">
    <div class="brand">
      <div class="brand-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L3 7V12C3 16.55 6.84 20.74 12 22C17.16 20.74 21 16.55 21 12V7L12 2Z"
            fill="url(#shieldGrad)" stroke="none"/>
          <path d="M9 12L11 14L15 10" stroke="#0ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient id="shieldGrad" x1="3" y1="2" x2="21" y2="22" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#00d4ff"/>
              <stop offset="100%" stop-color="#0057ff"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <span class="brand-name">Sentinel<span class="brand-x">X</span></span>
    </div>

    <!-- Live pulse dot showing extension is active -->
    <div class="status-pill" id="statusPill">
      <span class="pulse-dot"></span>
      <span class="status-text" id="statusText">Scanning...</span>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════
       MAIN CONTENT AREA
  ════════════════════════════════════════════ -->
  <main class="main">

    <!-- ── URL INFO CARD ── -->
    <section class="card url-card">
      <div class="card-label">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="#888" stroke-width="2"/>
          <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" stroke="#888" stroke-width="2"/>
        </svg>
        Current Site
      </div>
      <div class="url-display" id="urlDisplay">Loading...</div>

      <!-- HTTPS badge row -->
      <div class="meta-row">
        <div class="badge" id="httpsBadge">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="2"/>
          </svg>
          <span id="httpsLabel">Checking...</span>
        </div>
        <div class="badge badge-neutral" id="domainBadge">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke="currentColor" stroke-width="2"/>
          </svg>
          <span id="domainLabel">—</span>
        </div>
      </div>
    </section>

    <!-- ── RISK SCORE CARD ── -->
    <section class="card risk-card">
      <div class="card-label">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" stroke="#888" stroke-width="2"/>
          <line x1="12" y1="9" x2="12" y2="13" stroke="#888" stroke-width="2"/>
          <line x1="12" y1="17" x2="12.01" y2="17" stroke="#888" stroke-width="2"/>
        </svg>
        Threat Analysis
      </div>

      <!-- Radial score display -->
      <div class="score-display">
        <div class="score-ring-wrap">
          <svg class="score-ring" viewBox="0 0 80 80" width="80" height="80">
            <!-- Track circle -->
            <circle cx="40" cy="40" r="34" class="ring-track"/>
            <!-- Filled arc — stroke-dashoffset is set by JS -->
            <circle cx="40" cy="40" r="34" class="ring-fill" id="riskRingFill"/>
          </svg>
          <div class="score-center">
            <span class="score-number" id="riskScore">—</span>
            <span class="score-unit">/100</span>
          </div>
        </div>

        <div class="score-meta">
          <div class="safety-label" id="safetyLabel">
            <span class="label-dot" id="labelDot"></span>
            <span id="labelText">Analyzing</span>
          </div>
          <div class="score-detail" id="scoreDetail">Running checks...</div>
        </div>
      </div>

      <!-- Animated progress bar -->
      <div class="risk-bar-wrap">
        <div class="risk-bar-track">
          <div class="risk-bar-fill" id="riskBarFill"></div>
        </div>
        <div class="risk-bar-labels">
          <span>Safe</span><span>Moderate</span><span>Dangerous</span>
        </div>
      </div>
    </section>

    <!-- ── CHECKS LIST CARD ── -->
    <section class="card checks-card">
      <div class="card-label">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
          <path d="M9 11l3 3L22 4" stroke="#888" stroke-width="2" stroke-linecap="round"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" stroke="#888" stroke-width="2"/>
        </svg>
        Security Checks
      </div>

      <ul class="checks-list" id="checksList">
        <!-- Populated dynamically by popup.js -->
        <li class="check-item check-pending">
          <span class="check-icon">⏳</span>
          <span class="check-text">Running analysis...</span>
        </li>
      </ul>
    </section>

  </main>

  <!-- ═══════════════════════════════════════════
       FOOTER
  ════════════════════════════════════════════ -->
  <footer class="footer">
    <span class="footer-time" id="scanTime">—</span>
    <span class="footer-brand">SentinelX v1.0</span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
